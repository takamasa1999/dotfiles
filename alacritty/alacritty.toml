# https://alacritty.org/config-alacritty.html
[terminal]
osc52 = "OnlyCopy"

[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\u001bb"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\u001bf"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[mouse]
hide_when_typing = true

[window]
option_as_alt="Both"
padding = { x = 0, y = 0 }
dynamic_padding = true
decorations = "None"

[general]
import=[
    "~/.config/alacritty/machine-specific.toml",
    "~/.config/alacritty/theme.toml",
]

[env]
TERM="xterm-256color"
