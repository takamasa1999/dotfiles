# Appearance
tab_bar_edge top
hide_window_decorations yes
include themes/cyberdream.conf

# Fonts 	
font_family      Hack Nerd Font

bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 16

# Keybindings 	
map shift+command+alt+] move_tab_forward
map shift+command+alt+[ move_tab_backward
