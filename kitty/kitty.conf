# Appearance
tab_bar_edge top
hide_window_decorations yes
include themes/cyberdream.conf

# tab_title_template "{index}: {title}{' [⚙]' if num_status else ''}"
# tab_title_template "{session_name} {title}"
tab_title_template "{title}"
active_tab_title_template "{session_name} {title}"

# Show only tabs belonging to the active session (plus session-less tabs).
# This is what keeps switching sessions from showing duplicated tabs.
tab_bar_filter session:~ or session:^$

# Fonts 	
font_family      Hack Nerd Font

bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 16

# Clipboards
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Keybindings 	
#
# Tab navigations
map shift+cmd+alt+] move_tab_forward
map shift+cmd+alt+[ move_tab_backward

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Disable splitting window
map cmd+enter no_op

# Session management
# cmd+shift+o  — open/switch session (interactive picker)
# cmd+shift+s  — save current layout as a session file (preserves running programs)
# cmd+shift+x  — close current session
map cmd+shift+o goto_session ~/dotfiles/kitty/sessions
map cmd+shift+s save_as_session --base-dir ~/dotfiles/kitty/sessions --match=session:. --save-only --use-foreground-process .
map cmd+shift+x close_session

# New tab/window inherits current working directory (session-aware)
map cmd+t new_tab_with_cwd
map cmd+n new_window_with_cwd
